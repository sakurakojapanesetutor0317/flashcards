<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minna no Nihongo Lesson 4</title>
    <style>
        :root {
            --bg-color: #f5f3ff;
            --card-bg: #ffffff;
            --primary: #a78bfa;
            --text-main: #4c1d95;
            --border-color: #f3e8ff;
            --accent-pink: #f172a3;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .controls { margin-bottom: 20px; font-weight: 700; color: var(--primary); }
        .card { 
            width: 300px; height: 200px; background: var(--card-bg); 
            border: 4px solid var(--border-color); border-radius: 32px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 20px 40px -15px rgba(167, 139, 250, 0.2);
            cursor: pointer; transition: transform 0.3s; padding: 20px; text-align: center;
        }
        .card:hover { transform: scale(1.02); }
        .word { font-size: 32px; font-weight: 800; }
        ruby rt { font-size: 14px; color: var(--primary); }
        .romaji { font-size: 16px; color: #94a3b8; margin-top: 5px; }
        .hint { font-size: 14px; color: var(--accent-pink); margin-top: 15px; font-weight: 700; }
        button { margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: 700; background: #818cf8; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Minna no Nihongo Lesson 4</h1>

    <div class="controls">
        <label>
            <input type="checkbox" id="modeToggle" onchange="updateDisplay()"> Kanji + Furigana Mode
        </label>
    </div>

    <div class="card" id="card" onclick="flipCard()">
        <div id="wordDisplay">
            <div id="word" class="word">---</div>
            <div id="romaji" class="romaji">---</div>
        </div>
        <div class="hint">Click to flip</div>
    </div>
    
    <button onclick="nextCard()">Next Card 👉</button>

<script>
    const data = [
const data = [
    { k: "<ruby>朝<rt>あさ</rt></ruby>", r: "あさ", m: "a sa", a: "morning" },
    { k: "<ruby>昼<rt>ひる</rt></ruby>", r: "ひる", m: "hi ru", a: "daytime, noon" },
    { k: "<ruby>晩<rt>ばん</rt></ruby> / <ruby>夜<rt>よる</rt></ruby>", r: "ばん / よる", m: "ba n / yo ru", a: "night" },
    { k: "<ruby>郵便局<rt>ゆうびんきょく</rt></ruby>", r: "ゆうびんきょく", m: "yu u bi n kyo ku", a: "post office" },
    { k: "<ruby>図書館<rt>としょかん</rt></ruby>", r: "としょかん", m: "to sho ka n", a: "library" },
    { k: "<ruby>銀行<rt>ぎんこう</rt></ruby>", r: "ぎんこう", m: "gi n ko u", a: "bank" },
    { k: "<ruby>美術館<rt>びじゅつかん</rt></ruby>", r: "びじゅつかん", m: "bi ju tsu ka n", a: "art museum" },
    { k: "デパート", r: "デパート", m: "de pa - to", a: "department store" },
    { k: "<ruby>勉強<rt>べんきょう</rt></ruby>します", r: "べんきょうします", m: "be n kyo u shi ma su", a: "study" },
    { k: "<ruby>終<rt>お</rt></ruby>わります", r: "おわります", m: "o wa ri ma su", a: "finish" },
    { k: "<ruby>起<rt>お</rt></ruby>きます", r: "おきます", m: "o ki ma su", a: "wake up" },
    { k: "<ruby>寝<rt>ね</rt></ruby>ます", r: "ねます", m: "ne ma su", a: "sleep" },
    { k: "<ruby>休<rt>やす</rt></ruby>みます", r: "やすみます", m: "ya su mi ma su", a: "take a rest, take a holiday" },
    { k: "<ruby>働<rt>はたら</rt></ruby>きます", r: "はたらきます", m: "ha ta ra ki ma su", a: "work" },
    { k: "<ruby>月曜日<rt>げつようび</rt></ruby>", r: "げつようび", m: "ge tsu yo u bi", a: "Monday" },
    { k: "<ruby>火曜日<rt>かようび</rt></ruby>", r: "かようび", m: "ka yo u bi", a: "Tuesday" },
    { k: "<ruby>水曜日<rt>すいようび</rt></ruby>", r: "すいようび", m: "su i yo u bi", a: "Wednesday" },
    { k: "<ruby>木曜日<rt>もくようび</rt></ruby>", r: "もくようび", m: "mo ku yo u bi", a: "Thursday" },
    { k: "<ruby>金曜日<rt>きんようび</rt></ruby>", r: "きんようび", m: "ki n yo u bi", a: "Friday" },
    { k: "<ruby>土曜日<rt>どようび</rt></ruby>", r: "どようび", m: "do yo u bi", a: "Saturday" },
    { k: "<ruby>日曜日<rt>にちようび</rt></ruby>", r: "にちようび", m: "ni chi yo u bi", a: "Sunday" },
    { k: "<ruby>何曜日<rt>なんようび</rt></ruby>", r: "なんようび", m: "na n yo u bi", a: "What day of the week" }
    ];
    
    let index = 0;
    let isFront = true;

function updateDisplay() {
    const isKanjiMode = document.getElementById('modeToggle').checked;
    const wordDiv = document.getElementById('word');
    
    if (isFront) {
        if (isKanjiMode) {
            // ここでHTMLタグとしてそのまま出力します
            wordDiv.innerHTML = data[index].k;
        } else {
            wordDiv.innerHTML = data[index].r;
        }
        document.getElementById('romaji').innerText = data[index].m;
    } else {
        wordDiv.innerHTML = data[index].a;
        document.getElementById('romaji').innerText = "";        }
    }

    function flipCard() { isFront = !isFront; updateDisplay(); }
    function nextCard() { index = (index + 1) % data.length; isFront = true; updateDisplay(); }

    updateDisplay();
</script>
</body>
</html>
