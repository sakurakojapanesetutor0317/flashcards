<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minna no Nihongo Lesson 3</title>
    <style>
        :root {
            --bg-color: #f5f3ff;
            --card-bg: #ffffff;
            --primary: #a78bfa;
            --text-main: #4c1d95;
            --border-color: #f3e8ff;
            --accent-pink: #f172a3;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .controls { margin-bottom: 20px; font-weight: 700; color: var(--primary); }
        .card { 
            width: 300px; height: 200px; background: var(--card-bg); 
            border: 4px solid var(--border-color); border-radius: 32px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 20px 40px -15px rgba(167, 139, 250, 0.2);
            cursor: pointer; transition: transform 0.3s; padding: 20px; text-align: center;
        }
        .card:hover { transform: scale(1.02); }
        .word { font-size: 32px; font-weight: 800; }
        ruby rt { font-size: 14px; color: var(--primary); }
        .romaji { font-size: 16px; color: #94a3b8; margin-top: 5px; }
        .hint { font-size: 14px; color: var(--accent-pink); margin-top: 15px; font-weight: 700; }
        button { margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: 700; background: #818cf8; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Minna no Nihongo Lesson 3</h1>

    <div class="controls">
        <label>
            <input type="checkbox" id="modeToggle" onchange="updateDisplay()"> Kanji + Furigana Mode
        </label>
    </div>

    <div class="card" id="card" onclick="flipCard()">
        <div id="wordDisplay">
            <div id="word" class="word">---</div>
            <div id="romaji" class="romaji">---</div>
        </div>
        <div class="hint">Click to flip</div>
    </div>
    
    <button onclick="nextCard()">Next Card 👉</button>

<script>
    const data = [
{ k: "ここ", r: "ここ", m: "ko ko", a: "here" },
    { k: "そこ", r: "そこ", m: "so ko", a: "there" },
    { k: "あそこ", r: "あそこ", m: "a so ko", a: "over there" },
    { k: "どこ", r: "どこ", m: "do ko", a: "where" },
    { k: "<ruby>部屋<rt>へや</rt></ruby>", r: "へや", m: "he ya", a: "room" },
    { k: "<ruby>受付<rt>うけつけ</rt></ruby>", r: "うけつけ", m: "u ke tsu ke", a: "reception" },
    { k: "ロビー", r: "ロビー", m: "ro bi -", a: "lobby" },
    { k: "トイレ", r: "トイレ", m: "to i re", a: "toilet" },
    { k: "お<ruby>手洗<rt>てあら</rt></ruby>い", r: "おてあらい", m: "o te a ra i", a: "toilet / bathroom" },
    { k: "エレベーター", r: "エレベーター", m: "e re be - ta -", a: "elevator" },
    { k: "エスカレーター", r: "エスカレーター", m: "e su ka re - ta -", a: "escalator" },
    { k: "<ruby>階段<rt>かいだん</rt></ruby>", r: "かいだん", m: "ka i da n", a: "stair" },
    { k: "<ruby>国<rt>くに</rt></ruby>", r: "くに", m: "ku ni", a: "country" },
    { k: "<ruby>会社<rt>かいしゃ</rt></ruby>", r: "かいしゃ", m: "ka i sha", a: "company" },
    { k: "<ruby>靴<rt>くつ</rt></ruby>", r: "くつ", m: "ku tsu", a: "shoes" },
    { k: "<ruby>電話<rt>でんわ</rt></ruby>", r: "でんわ", m: "de n wa", a: "telephone" },
    { k: "<ruby>家<rt>いえ</rt></ruby>", r: "いえ", m: "i e", a: "home, house" },
    { k: "<ruby>食堂<rt>しょくどう</rt></ruby>", r: "しょくどう", m: "sho ku do u", a: "canteen" },
    { k: "<ruby>教室<rt>きょうしつ</rt></ruby>", r: "きょうしつ", m: "kyo u shi tsu", a: "classroom" },
    { k: "<ruby>会議室<rt>かいぎしつ</rt></ruby>", r: "かいぎしつ", m: "ka i gi shi tsu", a: "meeting room" },
    { k: "<ruby>事務所<rt>じむしょ</rt></ruby>", r: "じむしょ", m: "ji mu sho", a: "office" },
    { k: "ネクタイ", r: "ネクタイ", m: "ne ku ta i", a: "necktie" },
    { k: "ワイン", r: "ワイン", m: "wa i n", a: "wine" },
    { k: "<ruby>煙草<rt>たばこ</rt></ruby>", r: "たばこ", m: "ta ba ko", a: "tobacco, cigarette" },
    { k: "<ruby>日本語<rt>にほんご</rt></ruby>", r: "にほんご", m: "ni ho n go", a: "Japanese" },
    { k: "<ruby>英語<rt>えいご</rt></ruby>", r: "えいご", m: "e i go", a: "English" },
    { k: "いくら", r: "いくら", m: "i ku ra", a: "How much" }
    ];
    
    let index = 0;
    let isFront = true;

function updateDisplay() {
    const isKanjiMode = document.getElementById('modeToggle').checked;
    const wordDiv = document.getElementById('word');
    
    if (isFront) {
        if (isKanjiMode) {
            // ここでHTMLタグとしてそのまま出力します
            wordDiv.innerHTML = data[index].k;
        } else {
            wordDiv.innerHTML = data[index].r;
        }
        document.getElementById('romaji').innerText = data[index].m;
    } else {
        wordDiv.innerHTML = data[index].a;
        document.getElementById('romaji').innerText = "";
        }
    }

    function flipCard() { isFront = !isFront; updateDisplay(); }
    function nextCard() { index = (index + 1) % data.length; isFront = true; updateDisplay(); }

    updateDisplay();
</script>
</body>
</html>
