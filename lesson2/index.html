<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minna no Nihongo Lesson 2</title>
    <style>
        :root {
            --bg-color: #f5f3ff;
            --card-bg: #ffffff;
            --primary: #a78bfa;
            --text-main: #4c1d95;
            --border-color: #f3e8ff;
            --accent-pink: #f172a3;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .controls { margin-bottom: 20px; font-weight: 700; color: var(--primary); }
        .card { 
            width: 300px; height: 200px; background: var(--card-bg); 
            border: 4px solid var(--border-color); border-radius: 32px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 20px 40px -15px rgba(167, 139, 250, 0.2);
            cursor: pointer; transition: transform 0.3s; padding: 20px; text-align: center;
        }
        .card:hover { transform: scale(1.02); }
        .word { font-size: 32px; font-weight: 800; }
        ruby rt { font-size: 14px; color: var(--primary); }
        .romaji { font-size: 16px; color: #94a3b8; margin-top: 5px; }
        .hint { font-size: 14px; color: var(--accent-pink); margin-top: 15px; font-weight: 700; }
        button { margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: 700; background: #818cf8; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Minna no Nihongo Lesson 2</h1>

    <div class="controls">
        <label>
            <input type="checkbox" id="modeToggle" onchange="updateDisplay()"> Kanji + Furigana Mode
        </label>
    </div>

    <div class="card" id="card" onclick="flipCard()">
        <div id="wordDisplay">
            <div id="word" class="word">---</div>
            <div id="romaji" class="romaji">---</div>
        </div>
        <div class="hint">Click to flip</div>
    </div>
    
    <button onclick="nextCard()">Next Card 👉</button>

<script>
    const data = [
{ k: "これ", r: "これ", m: "ko re", a: "this / near the speaker" },
    { k: "それ", r: "それ", m: "so re", a: "that / near the listener" },
    { k: "あれ", r: "あれ", m: "a re", a: "that / far away" },
    { k: "どれ", r: "どれ", m: "do re", a: "which" },
    { k: "この", r: "この", m: "ko no", a: "this (+ NOUN) / near the speaker" },
    { k: "その", r: "その", m: "so no", a: "that (+ NOUN) / near the listener" },
    { k: "あの", r: "あの", m: "a no", a: "that (+ NOUN) / far away" },
    { k: "どの", r: "どの", m: "do no", a: "which (+ NOUN)" },
    { k: "<ruby>私<rt>わたし</rt></ruby>の", r: "わたしの", m: "wa ta shi no", a: "my" },
    { k: "<ruby>貴方<rt>あなた</rt></ruby>の", r: "あなたの", m: "a na ta no", a: "your" },
    { k: "<ruby>彼<rt>かれ</rt></ruby>の", r: "かれの", m: "ka re no", a: "his" },
    { k: "<ruby>彼女<rt>かのじょ</rt></ruby>の", r: "かのじょの", m: "ka no jo no", a: "hers" },
    { k: "<ruby>誰<rt>だれ</rt></ruby>", r: "だれ", m: "da re", a: "who" },
    { k: "<ruby>誰<rt>だれ</rt></ruby>の", r: "だれの", m: "da re no", a: "whose" },
    { k: "<ruby>何<rt>なん</rt></ruby>の", r: "なんの", m: "na n no", a: "what kind of" },
    { k: "<ruby>名刺<rt>めいし</rt></ruby>", r: "めいし", m: "me i shi", a: "business card" },
    { k: "カード", r: "カード", m: "ka- do", a: "card" },
    { k: "<ruby>手帳<rt>てちょう</rt></ruby>", r: "てちょう", m: "te cho u", a: "pocket note" },
    { k: "ノート", r: "ノート", m: "no - to", a: "notebook" },
    { k: "<ruby>辞書<rt>じしょ</rt></ruby>", r: "じしょ", m: "ji sho", a: "dictionary" },
    { k: "<ruby>新聞<rt>しんぶん</rt></ruby>", r: "しんぶん", m: "shi n bu n", a: "newspaper" },
    { k: "<ruby>本<rt>ほん</rt></ruby>", r: "ほん", m: "ho n", a: "book" },
    { k: "<ruby>雑誌<rt>ざっし</rt></ruby>", r: "ざっし", m: "za sshi", a: "magazine" },
    { k: "<ruby>傘<rt>かさ</rt></ruby>", r: "かさ", m: "ka sa", a: "umbrella" },
    { k: "テレビ", r: "テレビ", m: "te re bi", a: "television" },
    { k: "<ruby>時計<rt>とけい</rt></ruby>", r: "とけい", m: "to ke i", a: "watch" },
    { k: "かばん", r: "かばん", m: "ka ba n", a: "bag" },
    { k: "<ruby>車<rt>くるま</rt></ruby>", r: "くるま", m: "ku ru ma", a: "car" },
    { k: "カメラ", r: "カメラ", m: "ka me ra", a: "camera" },
    { k: "ラジオ", r: "ラジオ", m: "ra ji o", a: "radio" },
    { k: "コンピューター", r: "コンピューター", m: "ko n pyu - ta -", a: "computer" },
    { k: "コーヒー", r: "コーヒー", m: "ko - hi -", a: "coffee" },
    { k: "<ruby>机<rt>つくえ</rt></ruby>", r: "つくえ", m: "tsu ku e", a: "desk" },
    { k: "チョコレート", r: "チョコレート", m: "cho ko re - to", a: "chocolate" },
    { k: "<ruby>椅子<rt>いす</rt></ruby>", r: "いす", m: "i su", a: "chair" },
    { k: "<ruby>鍵<rt>かぎ</rt></ruby>", r: "かぎ", m: "ka gi", a: "key" },
    { k: "<ruby>鉛筆<rt>えんぴつ</rt></ruby>", r: "えんぴつ", m: "e n pi tsu", a: "pencil" },
    { k: "ボールペン", r: "ボールペン", m: "bo - ru pe n", a: "ballpoint pen" },
    { k: "シャーペン", r: "シャーペン", m: "sha - pe n", a: "mechanical pencil" }
    ];
    
    let index = 0;
    let isFront = true;

function updateDisplay() {
    const isKanjiMode = document.getElementById('modeToggle').checked;
    const wordDiv = document.getElementById('word');
    
    if (isFront) {
        if (isKanjiMode) {
            // ここでHTMLタグとしてそのまま出力します
            wordDiv.innerHTML = data[index].k;
        } else {
            wordDiv.innerHTML = data[index].r;
        }
        document.getElementById('romaji').innerText = data[index].m;
    } else {
        wordDiv.innerHTML = data[index].a;
        document.getElementById('romaji').innerText = "";
        }
    }

    function flipCard() { isFront = !isFront; updateDisplay(); }
    function nextCard() { index = (index + 1) % data.length; isFront = true; updateDisplay(); }

    updateDisplay();
</script>
</body>
</html>
