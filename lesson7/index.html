<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lesson 7</title>
    <style>
        :root {
            --bg-color: #f5f3ff;
            --card-bg: #ffffff;
            --primary: #a78bfa;
            --text-main: #4c1d95;
            --border-color: #f3e8ff;
            --accent-pink: #f172a3;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .controls { margin-bottom: 20px; font-weight: 700; color: var(--primary); }
        .card { 
            width: 300px; height: 200px; background: var(--card-bg); 
            border: 4px solid var(--border-color); border-radius: 32px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 20px 40px -15px rgba(167, 139, 250, 0.2);
            cursor: pointer; transition: transform 0.3s; padding: 20px; text-align: center;
        }
        .card:hover { transform: scale(1.02); }
        .word { font-size: 32px; font-weight: 800; }
        ruby rt { font-size: 14px; color: var(--primary); }
        .romaji { font-size: 16px; color: #94a3b8; margin-top: 5px; }
        .hint { font-size: 14px; color: var(--accent-pink); margin-top: 15px; font-weight: 700; }
        button { margin-top: 20px; padding: 12px 30px; font-size: 16px; font-weight: 700; background: #818cf8; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Minna no Nihongo Lesson 7</h1>

    <div class="controls">
        <label>
            <input type="checkbox" id="modeToggle" onchange="updateDisplay()"> Kanji + Furigana Mode
        </label>
    </div>

    <div class="card" id="card" onclick="flipCard()">
        <div id="wordDisplay">
            <div id="word" class="word">---</div>
            <div id="romaji" class="romaji">---</div>
        </div>
        <div class="hint">Click to flip</div>
    </div>
    
    <button onclick="nextCard()">Next Card 👉</button>

<script>
    const data = [
{ k: "<ruby>教<rt>おし</rt></ruby>えます", r: "おしえます", m: "o shi e ma su", a: "teach" },
    { k: "<ruby>習<rt>なら</rt></ruby>います", r: "ならいます", m: "na ra i ma su", a: "learn" },
    { k: "<ruby>貸<rt>か</rt></ruby>します", r: "かします", m: "ka shi ma su", a: "lend" },
    { k: "<ruby>借<rt>か</rt></ruby>ります", r: "かります", m: "ka ri ma su", a: "borrow" },
    { k: "あげます", r: "あげます", m: "a ge ma su", a: "give" },
    { k: "もらいます", r: "もらいます", m: "mo ra i ma su", a: "receive" },
    { k: "<ruby>送<rt>おく</rt></ruby>ります", r: "おくります", m: "o ku ri ma su", a: "send" },
    { k: "<ruby>切<rt>き</rt></ruby>ります", r: "きります", m: "ki ri ma su", a: "cut, slice" },
    { k: "かけます", r: "かけます", m: "ka ke ma su", a: "make (a phone call)" },
    { k: "<ruby>手<rt>て</rt></ruby>", r: "て", m: "te", a: "hand" },
    { k: "スプーン", r: "スプーン", m: "su pu - n", a: "spoon" },
    { k: "<ruby>箸<rt>はし</rt></ruby>", r: "はし", m: "ha shi", a: "chopsticks" },
    { k: "はさみ", r: "はさみ", m: "ha sa mi", a: "scissors" },
    { k: "ナイフ", r: "ナイフ", m: "na i fu", a: "knife" },
    { k: "フォーク", r: "フォーク", m: "fo - ku", a: "fork" },
    { k: "パソコン", r: "パソコン", m: "pa so ko n", a: "personal computer" },
    { k: "<ruby>荷物<rt>にもつ</rt></ruby>", r: "にもつ", m: "ni mo tsu", a: "baggage, parcel" },
    { k: "<ruby>紙<rt>かみ</rt></ruby>", r: "かみ", m: "ka mi", a: "paper" },
    { k: "<ruby>花<rt>はな</rt></ruby>", r: "はな", m: "ha na", a: "flower, blossom" },
    { k: "シャツ", r: "シャツ", m: "sha tsu", a: "shirt" },
    { k: "お<ruby>土産<rt>みやげ</rt></ruby>", r: "おみやげ", m: "o mi ya ge", a: "souvenir" },
    { k: "ホッチキス", r: "ホッチキス", m: "ho cchi ki su", a: "stapler" },
    { k: "<ruby>消<rt>け</rt></ruby>しゴム", r: "けしゴム", m: "ke shi go mu", a: "eraser" },
    { k: "<ruby>旅行<rt>りょこう</rt></ruby>", r: "りょこう", m: "ryo ko u", a: "travel" },
    { k: "お<ruby>金<rt>かね</rt></ruby>", r: "おかね", m: "o ka ne", a: "money" },
    { k: "プレゼント", r: "プレゼント", m: "pu re ze n to", a: "present" },
    { k: "お<ruby>父<rt>とう</rt></ruby>さん", r: "おとうさん", m: "o to u sa n", a: "father" },
    { k: "お<ruby>母<rt>かあ</rt></ruby>さん", r: "おかあさん", m: "o ka a sa n", a: "mother" }
    ];
    
    let index = 0;
    let isFront = true;

function updateDisplay() {
    const isKanjiMode = document.getElementById('modeToggle').checked;
    const wordDiv = document.getElementById('word');
    
    if (isFront) {
        if (isKanjiMode) {
            // ここでHTMLタグとしてそのまま出力します
            wordDiv.innerHTML = data[index].k;
        } else {
            wordDiv.innerHTML = data[index].r;
        }
        document.getElementById('romaji').innerText = data[index].m;
    } else {
        wordDiv.innerHTML = data[index].a;
        document.getElementById('romaji').innerText = "";
        }
    }

    function flipCard() { isFront = !isFront; updateDisplay(); }
    function nextCard() { index = (index + 1) % data.length; isFront = true; updateDisplay(); }

    updateDisplay();
</script>
</body>
</html>
